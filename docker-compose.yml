version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: traffic_fyp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
